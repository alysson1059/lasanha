<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa da Lasanha - Sabores Clássicos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="banner-container">
            <picture>
                <!-- Se a tela for menor que 768px, usa o Banner Mobile -->
                <source media="(max-width: 767px)" srcset="bannermobile.png">
                <!-- Se for maior, usa o Banner Desktop -->
                <img src="bannerdesktop.png" alt="Banner Casa da Lasanha" class="banner-img">
            </picture>
            <div class="overlay"></div>
        </div>
        
        <div class="profile-info">
            <div class="logo-box">
                <!-- Usando sua logo oficial -->
                <img src="logocasalasanha.jpg" alt="Logo Casa da Lasanha">
            </div>
            <div class="text-info">
                <h1>Casa da Lasanha</h1>
                <p>Sabores clássicos de alta gastronomia</p>
                <span id="store-status" class="status"><i class="fa-solid fa-clock"></i> Carregando...</span>
            </div>
            <a href="admin.html" class="btn-adm"><i class="fa-solid fa-lock"></i> Painel ADM</a>
        </div>
    </header>

   <!-- ABA 1: CARDÁPIO (Conteúdo Principal) -->
<section id="aba-cardapio" class="secao-aba">
    <nav class="categories">
        <button class="cat-btn active">Promoções</button>
        <button class="cat-btn">Panquecas</button>
        <button class="cat-btn">Lasanhas</button>
        <button class="cat-btn">Refrigerantes</button>
    </nav>

    <main class="menu-container">
        <div class="products-grid" id="products-list">
            <!-- Itens do Firebase -->
        </div>
    </main>
</section>

<!-- ABA 2: PEDIDOS (Histórico) -->
<section id="aba-pedidos" class="secao-aba" style="display: none;">
    <div style="padding: 20px;">
        <h2 style="color: var(--vinho-logo);">Meus Pedidos</h2>
        <div id="lista-historico">
            <p style="text-align: center; margin-top: 50px; color: #777;">
                Digite seu telefone no perfil para ver seu histórico.
            </p>
        </div>
    </div>
</section>

<!-- ABA 3: PERFIL (Dados do Cliente) -->
<section id="aba-perfil" class="secao-aba" style="display: none;">
    <div class="perfil-container" style="padding: 20px; max-width: 500px; margin: 0 auto;">
        <div style="text-align: center; margin-bottom: 25px;">
            <div style="background: var(--vinho-logo); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;">
                <i class="fa-solid fa-user" style="color: white; font-size: 2rem;"></i>
            </div>
            <h2 style="color: var(--vinho-logo); margin: 0;">Meus Dados</h2>
            <p style="font-size: 0.9rem; color: #666;">Mantenha seus dados atualizados para entregas rápidas</p>
        </div>

      <form id="perfil-form" class="admin-card" style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    <!-- Nome Completo -->
    <div class="form-group" style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px;"><i class="fa-solid fa-signature"></i> Nome</label>
        <input type="text" id="user-name" placeholder="Ex: João Silva" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;" required>
    </div>

    <!-- WhatsApp -->
    <div class="form-group" style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px;"><i class="fa-brands fa-whatsapp"></i> WhatsApp/contato</label>
        <input type="text" id="user-phone" placeholder="(79) 99999-9999" maxlength="15" oninput="maskPhone(this)" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
    </div>

    <!-- Seção de Endereço -->
    <div style="margin-top: 20px; border-top: 1px dashed #ddd; padding-top: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <label style="margin: 0; font-weight: bold; color: var(--vinho-logo);">Endereço de Entrega</label>
            <button type="button" onclick="getUserLocation()" style="background: var(--accent); color: white; border: none; padding: 5px 12px; border-radius: 50px; font-size: 0.75rem; cursor: pointer;">
                <i class="fa-solid fa-location-crosshairs"></i> Usar GPS
            </button>
        </div>

        <!-- Rua / Avenida -->
        <div class="form-group" style="margin-bottom: 10px;">
            <input type="text" id="user-street" placeholder="Rua / Avenida" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;" required>
        </div>

        <!-- CEP (Agora abaixo do endereço) -->
        <div class="form-group" style="margin-bottom: 10px;">
            <input type="text" id="user-cep" placeholder="CEP (Opcional)" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>

        <!-- Número e Ponto de Referência (Empilhados verticalmente no mobile para evitar erro de tela) -->
        <div class="form-group" style="margin-bottom: 10px;">
            <input type="text" id="user-number" placeholder="Nº ou S/N" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <input type="text" id="user-ref" placeholder="Ponto de Referência (Ex: Próximo ao mercado)" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>
    </div>

    <!-- Botão Salvar -->
    <button type="submit" class="btn-save" style="margin-top: 10px; background: var(--vinho-logo); color: white; border-radius: 8px; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1rem;">
        <i class="fa-solid fa-check"></i> Salvar Perfil
    </button>
</form>
    </div>
</section>

  <footer class="bottom-nav">
    <div class="nav-item active" onclick="trocarAba('aba-cardapio', this)">
        <i class="fa-solid fa-utensils"></i>
        <span>Cardápio</span>
    </div>
    <div class="nav-item" onclick="trocarAba('aba-pedidos', this)">
        <i class="fa-solid fa-receipt"></i>
        <span>Pedidos</span>
    </div>
    <div class="nav-item" onclick="trocarAba('aba-perfil', this)">
        <i class="fa-solid fa-user"></i>
        <span>Perfil</span>
    </div>
</footer>

<!-- Carrinho Flutuante (Ficará acima do menu) -->
<div id="btn-carrinho-flutuante" onclick="toggleCart()" style="display: none;">
    <div id="cart-count" class="cart-badge">0</div>
    <i class="fa-solid fa-bag-shopping"></i>
    <span>Ver Sacola</span>
</div>

    <!-- Scripts do Firebase vão aqui depois -->
  <script type="module" src="script.js"></script>

    <!-- GAVETA DO CARRINHO (MODAL) -->
<!-- GAVETA DO CARRINHO (MODAL) ATUALIZADA -->
<div id="cart-modal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000;">
    <div style="background: white; width: 85%; max-width: 400px; height: 100%; margin-left: auto; padding: 20px; display: flex; flex-direction: column;">
        
        <!-- Cabeçalho -->
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px;">
            <h2 style="color: var(--vinho-logo); margin: 0; font-size: 1.3rem;">
                <i class="fa-solid fa-bag-shopping"></i> Sua Sacola
            </h2>
            <button onclick="toggleCart()" style="background: none; border: none; font-size: 1.8rem; cursor: pointer; color: #777;">&times;</button>
        </div>
        
        <!-- Lista de Itens (Rolável) -->
        <div id="cart-items" style="flex: 1; overflow-y: auto; padding: 15px 0;">
            <!-- Itens do carrinho aparecem aqui via JS -->
        </div>

        <!-- Rodapé Fixo -->
        <div style="border-top: 2px solid #eee; padding-top: 15px;">
            
            <!-- SEÇÃO: FORMA DE PAGAMENTO -->
            <div style="margin-bottom: 20px; padding: 12px; background: #f9f9f9; border-radius: 10px; border: 1px solid #eee;">
                <label style="display: block; font-weight: bold; color: var(--vinho-logo); margin-bottom: 8px; font-size: 0.9rem;">
                    <i class="fa-solid fa-credit-card"></i> Como deseja pagar?
                </label>
                <select id="payment-method" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: white; font-family: inherit; cursor: pointer;">
                   
                    <option value="Pix">Pix</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão de Débito">Cartão de Débito</option>
                    <option value="Cartão de Crédito">Cartão de Crédito</option>
                </select>
                
<div id="troco-container" style="display: none; margin-top: 10px; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px;">
    <label style="display: block; font-size: 0.85rem; color: #555; margin-bottom: 5px;">Troco para quanto?</label>
    <div style="display: flex; align-items: center; gap: 5px;">
        <span style="color: #777; font-weight: bold;">R$</span>
        <!-- Mudado para type="text" e adicionado o oninput -->
        <input type="text" id="troco-valor" placeholder="0,00" oninput="maskMoney(this)" style="width: 100%; border: none; outline: none; font-family: inherit;">
    </div>
</div>
                
               
            </div>

            <!-- Total -->
            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; color: #333;">
                <span>Total:</span>
                <span id="total-price">R$ 0,00</span>
            </div>

            <!-- Botão Finalizar -->
            <button class="btn-save btn-checkout" style="background: var(--accent); width: 100%; padding: 16px; border-radius: 10px; border: none; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;">
                <i class="fa-brands fa-whatsapp"></i> Finalizar Pedido
            </button>
        </div>
    </div>
</div>
</body>
</html>
