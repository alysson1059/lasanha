<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa da Lasanha - Sabores Clássicos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="banner-container">
            <picture>
                <!-- Se a tela for menor que 768px, usa o Banner Mobile -->
                <source media="(max-width: 767px)" srcset="bannermobile.png">
                <!-- Se for maior, usa o Banner Desktop -->
                <img src="bannerdesktop.png" alt="Banner Casa da Lasanha" class="banner-img">
            </picture>
            <div class="overlay"></div>
        </div>
        
        <div class="profile-info">
            <div class="logo-box">
                <!-- Usando sua logo oficial -->
                <img src="logocasalasanha.jpg" alt="Logo Casa da Lasanha">
            </div>
            <div class="text-info">
                <h1>Casa da Lasanha</h1>
                <p>Sabores clássicos de alta gastronomia</p>
                <span id="store-status" class="status"><i class="fa-solid fa-clock"></i> Carregando...</span>
            </div>
            <a href="admin.html" class="btn-adm"><i class="fa-solid fa-lock"></i> Painel ADM</a>
        </div>
    </header>

   <!-- ABA 1: CARDÁPIO (Conteúdo Principal) -->
<section id="aba-cardapio" class="secao-aba">
    <nav class="categories">
        <button class="cat-btn active">Promoções</button>
        <button class="cat-btn">Panquecas</button>
        <button class="cat-btn">Lasanhas</button>
        <button class="cat-btn">Refrigerantes</button>
    </nav>

    <main class="menu-container">
        <div class="products-grid" id="products-list">
            <!-- Itens do Firebase -->
        </div>
    </main>
</section>

<!-- ABA 2: PEDIDOS (Histórico) -->
<section id="aba-pedidos" class="secao-aba" style="display: none;">
    <div style="padding: 20px;">
        <h2 style="color: var(--vinho-logo);">Meus Pedidos</h2>
        <div id="lista-historico">
            <p style="text-align: center; margin-top: 50px; color: #777;">
                Digite seu telefone no perfil para ver seu histórico.
            </p>
        </div>
    </div>
</section>

<!-- ABA 3: PERFIL (Dados do Cliente) -->
<section id="aba-perfil" class="secao-aba" style="display: none;">
    <div style="padding: 20px;">
        <h2 style="color: var(--vinho-logo); margin-bottom: 20px;">Meu Perfil</h2>
        <form id="perfil-form" class="admin-card">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="user-name" placeholder="Como quer ser chamado?">
            </div>
            <div class="form-group">
                <label>WhatsApp (Somente números)</label>
                <input type="number" id="user-phone" placeholder="Ex: 79999999999">
            </div>
            <div class="form-group">
                <label>Endereço de Entrega</label>
                <textarea id="user-address" rows="3" placeholder="Rua, número, bairro e referência"></textarea>
            </div>
            <button type="submit" class="btn-save">Salvar Dados</button>
        </form>
    </div>
</section>

  <footer class="bottom-nav">
    <div class="nav-item active" onclick="trocarAba('aba-cardapio', this)">
        <i class="fa-solid fa-utensils"></i>
        <span>Cardápio</span>
    </div>
    <div class="nav-item" onclick="trocarAba('aba-pedidos', this)">
        <i class="fa-solid fa-receipt"></i>
        <span>Pedidos</span>
    </div>
    <div class="nav-item" onclick="trocarAba('aba-perfil', this)">
        <i class="fa-solid fa-user"></i>
        <span>Perfil</span>
    </div>
</footer>

<!-- Carrinho Flutuante (Ficará acima do menu) -->
<div id="btn-carrinho-flutuante" onclick="toggleCart()" style="display: none;">
    <div id="cart-count" class="cart-badge">0</div>
    <i class="fa-solid fa-bag-shopping"></i>
    <span>Ver Sacola</span>
</div>

    <!-- Scripts do Firebase vão aqui depois -->
  <script type="module" src="script.js"></script>

    <!-- GAVETA DO CARRINHO (MODAL) -->
<div id="cart-modal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000;">
    <div style="background: white; width: 85%; max-width: 400px; height: 100%; margin-left: auto; padding: 20px; display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px;">
            <h2 style="color: var(--vinho-logo);"><i class="fa-solid fa-bag-shopping"></i> Sua Sacola</h2>
            <button onclick="toggleCart()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
        </div>
        
        <div id="cart-items" style="flex: 1; overflow-y: auto; padding: 20px 0;">
            <!-- Itens do carrinho aparecem aqui -->
        </div>

        <div style="border-top: 2px solid #eee; padding-top: 15px;">
            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; margin-bottom: 20px;">
                <span>Total:</span>
                <span id="total-price">R$ 0,00</span>
            </div>
            <button class="btn-save btn-checkout" style="background: var(--accent); width: 100%; padding: 15px; border-radius: 8px;">Finalizar Pedido</button>
        </div>
    </div>
</div>
    
</body>
</html>
